{% extends "base.html" %}
{% block title %}상품 수정{% endblock %}
{% block content %}
<h2>상품 수정</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  제목: <input type="text" name="title" maxlength="100" value="{{ product.title }}" required><br>
  설명: <br>
  <textarea name="description" rows="4" cols="50" maxlength="2000" required>{{ product.description }}</textarea><br>
  가격 (원): <input type="number" name="price" min="1" max="100000000" step="1" value="{{ product.price }}" required><br>
  상태:
  <select name="status">
    <option value="active" {% if product.status == 'active' %}selected{% endif %}>판매중</option>
    <option value="sold" {% if product.status == 'sold' %}selected{% endif %}>거래완료</option>
  </select><br>
  <button type="submit">수정 완료</button>
</form>
{% endblock %}
