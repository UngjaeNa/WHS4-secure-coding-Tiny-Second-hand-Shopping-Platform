{% extends "base.html" %}
{% block title %}상품 관리{% endblock %}
{% block content %}
<h2>상품 관리</h2>
<p><a href="{{ url_for('admin_dashboard') }}">&larr; 대시보드로</a></p>
<table border="1" cellpadding="6">
  <tr><th>상품명</th><th>가격</th><th>상태</th><th>관리</th></tr>
  {% for p in products %}
    <tr>
      <td><a href="{{ url_for('view_product', product_id=p.id) }}">{{ p.title }}</a></td>
      <td>{{ "{:,}".format(p.price) }}원</td>
      <td>{{ p.status }}</td>
      <td>
        <form method="post" action="{{ url_for('admin_toggle_product_status', product_id=p.id) }}" style="display:inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit">
            {{ '차단 해제' if p.status == 'blocked' else '차단' }}
          </button>
        </form>
      </td>
    </tr>
  {% endfor %}
</table>
{% endblock %}
