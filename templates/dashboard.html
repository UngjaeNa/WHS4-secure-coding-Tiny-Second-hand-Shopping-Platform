{% extends "base.html" %}
{% block title %}대시보드{% endblock %}
{% block content %}
<h2>대시보드</h2>
<h3>등록된 상품</h3>
<ul>
  {% for product in products %}
    <li>
      <a href="{{ url_for('view_product', product_id=product.id) }}">{{ product.title }}</a>
      - 가격: {{ product.price }}
    </li>
  {% endfor %}
</ul>
<p><a href="{{ url_for('new_product') }}">새 상품 등록</a></p>

<h3>실시간 채팅 (전체)</h3>
<div id="chat">
  <ul id="messages"></ul>
  <input id="chat_input" type="text" placeholder="메시지를 입력하세요 (최대 500자)" maxlength="500">
  <button onclick="sendMessage()">전송</button>
  <p id="chat_error" style="color:red;"></p>
</div>

<script type="text/javascript">
  var socket = io();
  var messagesEl = document.getElementById('messages');

  function appendMessage(username, message, timestamp) {
    var item = document.createElement('li');
    item.textContent = "[" + timestamp + "] " + username + ": " + message;  // textContent로 XSS 방지
    messagesEl.appendChild(item);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // 서버에서 렌더링된 과거 메시지 (Jinja2가 자동 이스케이프 처리)
  var history = [
    {% for m in history %}
      {username: {{ m.sender.username | tojson }}, message: {{ m.content | tojson }}, timestamp: {{ m.created_at.strftime('%H:%M:%S') | tojson }}},
    {% endfor %}
  ];
  messagesEl.innerHTML = "";
  history.forEach(function(m) { appendMessage(m.username, m.message, m.timestamp); });

  socket.on('connect', function() {
    socket.emit('join', {room_type: 'all'});
  });

  socket.on('new_message', function(data) {
    appendMessage(data.username, data.message, data.timestamp);
  });

  socket.on('chat_error', function(data) {
    document.getElementById('chat_error').textContent = data.message;
    setTimeout(function() { document.getElementById('chat_error').textContent = ""; }, 3000);
  });

  function sendMessage() {
    var input = document.getElementById('chat_input');
    var message = input.value;
    if (message.trim()) {
      socket.emit('send_message', { room_type: 'all', message: message });
      input.value = "";
    }
  }
</script>
{% endblock %}
